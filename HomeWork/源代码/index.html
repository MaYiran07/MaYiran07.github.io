<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片颜色聚类可视化 - K-Means</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
</head>
<body>

<div class="header">
  <h1>图片颜色聚类可视化</h1>
</div>

<div class="container">
  <aside class="sidebar">
    <div class="card">
      <div class="card-title">1. 选择图片</div>
      <div class="upload-zone" id="uploadZone">
        <div class="upload-text">点击或拖拽上传图片</div>
        <div class="upload-hint">支持 JPG / PNG / WebP</div>
      </div>
      <input type="file" id="fileInput" accept="image/*" style="display:none">
      <img id="imagePreview" alt="预览">
      <div class="example-images" id="exampleImages">
        <img class="example-img" src="../example/01.jpg" data-src="../example/01.jpg" alt="示例1" title="示例图片 1">
        <img class="example-img" src="../example/02.jpg" data-src="../example/02.jpg" alt="示例2" title="示例图片 2">
        <img class="example-img" src="../example/03.jpg" data-src="../example/03.jpg" alt="示例3" title="示例图片 3">
        <img class="example-img" src="../example/04.jpg" data-src="../example/04.jpg" alt="示例4" title="示例图片 4">
      </div>
    </div>

    <div class="card">
      <div class="card-title">2. 聚类参数</div>
      <div class="form-group">
        <label>聚类数量 K <span class="value" id="kValueLabel">3</span></label>
        <input type="range" id="kSlider" min="2" max="10" value="3" step="1">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:#94a3b8;margin-top:2px">
          <span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>10</span>
        </div>
      </div>
      <div class="form-group">
        <label style="margin-bottom:8px">颜色空间</label>
        <div class="radio-group" id="colorSpaceGroup">
          <label class="radio-btn"><input type="radio" name="colorSpace" value="RGB" checked><span>RGB</span></label>
          <label class="radio-btn"><input type="radio" name="colorSpace" value="LAB"><span>LAB</span></label>
        </div>
      </div>
      <div class="form-group">
        <label style="margin-bottom:8px">可视化样式</label>
        <div class="radio-group" id="chartTypeGroup">
          <label class="radio-btn"><input type="radio" name="chartType" value="pie" checked><span>饼图</span></label>
          <label class="radio-btn"><input type="radio" name="chartType" value="bar"><span>柱状图</span></label>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">3. AI 颜色分析</div>
      <details>
        <summary>API 配置（展开设置）</summary>
        <div class="api-config">
          <label style="font-size:12px">API Endpoint</label>
          <input type="text" id="apiEndpoint" value="https://api.deepseek.com/chat/completions" placeholder="API 地址">
          <label style="font-size:12px;margin-top:8px">API Key</label>
          <input type="password" id="apiKey" placeholder="sk-...">
          <label style="font-size:12px;margin-top:8px">系统提示词（可选）</label>
          <textarea id="systemPrompt" rows="2" placeholder='自定义分析提示词&#10;默认：判断颜色搭配是否和谐'>你是一位专业的色彩设计师。请判断以下颜色搭配是否和谐美观，给出专业分析和建议。</textarea>
        </div>
      </details>
      <button class="btn btn-outline" id="aiCheckBtn" style="margin-top:12px" disabled>
        判断颜色是否和谐
      </button>
      <div id="aiResult" class="ai-result" style="margin-top:12px;display:none"></div>
    </div>

    <button class="btn btn-primary" id="runBtn" disabled>
      运行聚类分析
    </button>

    <div id="errorMsg"></div>
  </aside>

  <main class="main-content">
    <div class="card" style="flex:1;display:flex;flex-direction:column">
      <div class="card-title">聚类结果可视化</div>
      <div class="chart-container" id="chartContainer">
        <div id="noDataHint">
          <div>请先选择图片，然后点击"运行聚类分析"</div>
        </div>
      </div>
    </div>
    <div class="card" id="clusterDetailCard" style="display:none">
      <div class="card-title">各类簇颜色与统计</div>
      <div class="cluster-palette" id="clusterPalette"></div>
    </div>
  </main>
</div>

<div class="processing-overlay" id="processingOverlay">
  <div class="processing-modal">
    <div class="spinner"></div>
    <div id="processingText">正在处理...</div>
  </div>
</div>

<script>
// ============================================================
// 颜色空间转换模块: RGB → LAB (D65 标准光源)
// ============================================================
const ColorSpace = (() => {
  function srgbToLinear(c) {
    c /= 255;
    return c <= 0.04045 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
  }

  function labF(t) {
    const delta = 6 / 29;
    return t > Math.pow(delta, 3)
      ? Math.cbrt(t)
      : t / (3 * delta * delta) + 4 / 29;
  }

  const REF_X = 95.047, REF_Y = 100.0, REF_Z = 108.883;

  function rgbToLab(r, g, b) {
    let lr = srgbToLinear(r), lg = srgbToLinear(g), lb = srgbToLinear(b);
    let x = (0.4124564 * lr + 0.3575761 * lg + 0.1804375 * lb) * 100;
    let y = (0.2126729 * lr + 0.7151522 * lg + 0.0721750 * lb) * 100;
    let z = (0.0193339 * lr + 0.1191920 * lg + 0.9503041 * lb) * 100;
    let fx = labF(x / REF_X), fy = labF(y / REF_Y), fz = labF(z / REF_Z);
    return { l: 116 * fy - 16, a: 500 * (fx - fy), b: 200 * (fy - fz) };
  }

  function distanceLab(c1, c2) {
    return Math.sqrt(
      (c1.l - c2.l) ** 2 + (c1.a - c2.a) ** 2 + (c1.b - c2.b) ** 2
    );
  }

  function distanceRgb(c1, c2) {
    return Math.sqrt(
      (c1.r - c2.r) ** 2 + (c1.g - c2.g) ** 2 + (c1.b - c2.b) ** 2
    );
  }

  return { rgbToLab, distanceLab, distanceRgb };
})();

// ============================================================
// K-Means 聚类模块 (K-means++ 初始化)
// ============================================================
class KMeans {
  constructor(k, maxIter = 50, tol = 0.01) {
    this.k = k;              // 聚类数量
    this.maxIter = maxIter;  // 最大迭代次数
    this.tol = tol;          // 中心偏移收敛阈值
    this.centroids = null;
    this.labels = null;
    this.iterations = 0;
  }

  fit(data, distanceFn) {
    if (data.length === 0) throw new Error('No data to cluster');
    if (this.k > data.length) this.k = data.length;

    // K-means++ 初始化中心点
    this.centroids = this._initPlusPlus(data, distanceFn);
    const n = data.length;
    this.labels = new Array(n);

    // 迭代—分配 → 更新中心 → 检查收敛
    for (let iter = 0; iter < this.maxIter; iter++) {
      this.iterations = iter + 1;
      let changed = false;

      // 每个数据点归为最近中心所属的类
      for (let i = 0; i < n; i++) {
        const newLabel = this._closestCentroid(data[i], distanceFn);
        if (this.labels[i] !== newLabel) { this.labels[i] = newLabel; changed = true; }
      }
      if (!changed) break;  // 标签无变化，已收敛

      // 根据新划分重新计算中心位置
      const newCentroids = this._computeCentroids(data);
      let maxShift = 0;
      for (let c = 0; c < this.k; c++) {
        maxShift = Math.max(maxShift, distanceFn(this.centroids[c], newCentroids[c]));
        this.centroids[c] = newCentroids[c];
      }

      // 中心位置几乎不动，收敛结束
      if (maxShift < this.tol) break;
    }
    return this;
  }

  //  K-means++ 初始化：使初始中心点尽量分散，避免陷入局部最优
  _initPlusPlus(data, distanceFn) {
    const centroids = [];

    // 第一个中心随机选取
    centroids.push(data[Math.floor(Math.random() * data.length)]);

    // 后续中心按 D² 加权概率选取（越远离已有中心，被选中概率越大）
    for (let c = 1; c < this.k; c++) {
      const dists = new Array(data.length);
      let sumDist = 0;
      for (let i = 0; i < data.length; i++) {
        let minD = Infinity;
        for (const centroid of centroids) {
          minD = Math.min(minD, distanceFn(data[i], centroid));
        }
        dists[i] = minD * minD;
        sumDist += dists[i];
      }
      let r = Math.random() * sumDist;
      for (let i = 0; i < data.length; i++) {
        r -= dists[i];
        if (r <= 0) { centroids.push(data[i]); break; }
      }
      if (centroids.length <= c) centroids.push(data[data.length - 1]);
    }
    return centroids;
  }

  // 找最近中心点（欧氏距离）
  _closestCentroid(point, distanceFn) {
    let minDist = Infinity, minIdx = 0;
    for (let c = 0; c < this.k; c++) {
      const d = distanceFn(this.centroids[c], point);
      if (d < minDist) { minDist = d; minIdx = c; }
    }
    return minIdx;
  }

  // 重新计算各类簇的中心（均值）
  _computeCentroids(data) {
    const sums = new Array(this.k).fill(null);
    const counts = new Array(this.k).fill(0);
    for (let i = 0; i < data.length; i++) {
      const label = this.labels[i];
      if (!sums[label]) {
        sums[label] = Object.keys(data[i]).reduce((acc, key) => { acc[key] = data[i][key]; return acc; }, {});
      } else {
        for (const key of Object.keys(data[i])) {
          sums[label][key] += data[i][key];
        }
      }
      counts[label]++;
    }
    const centroids = [];
    for (let c = 0; c < this.k; c++) {
      if (counts[c] > 0) {
        const avg = {};
        for (const key of Object.keys(sums[c])) {
          avg[key] = sums[c][key] / counts[c];
        }
        centroids.push(avg);
      } else {
        // 空簇处理：随机选一个数据点作为新中心
        centroids.push(data[Math.floor(Math.random() * data.length)]);
      }
    }
    return centroids;
  }

  // 获取聚类统计：每个簇的中心、像素数、占比，按像素数降序排列
  getClusterStats(data) {
    const stats = [];
    for (let c = 0; c < this.k; c++) {
      const members = data.filter((_, i) => this.labels[i] === c);
      stats.push({ centroid: this.centroids[c], count: members.length, percentage: members.length / data.length * 100 });
    }
    stats.sort((a, b) => b.count - a.count);
    return stats;
  }
}

// ============================================================
// 应用主逻辑
// ============================================================
(function() {

  const MAX_PIXELS = 60000;

  let currentImageData = null;
  let clusterResult = null;
  let currentColorSpace = 'RGB';
  let currentChartType = 'pie';
  let chartInstance = null;
  let currentImageUrl = null;

  const uploadZone = document.getElementById('uploadZone');
  const fileInput = document.getElementById('fileInput');
  const imagePreview = document.getElementById('imagePreview');
  const kSlider = document.getElementById('kSlider');
  const kValueLabel = document.getElementById('kValueLabel');
  const runBtn = document.getElementById('runBtn');
  const aiCheckBtn = document.getElementById('aiCheckBtn');
  const errorMsg = document.getElementById('errorMsg');
  const noDataHint = document.getElementById('noDataHint');
  const chartContainer = document.getElementById('chartContainer');
  const clusterPalette = document.getElementById('clusterPalette');
  const clusterDetailCard = document.getElementById('clusterDetailCard');
  const aiResult = document.getElementById('aiResult');
  const processingOverlay = document.getElementById('processingOverlay');
  const processingText = document.getElementById('processingText');
  const exampleImgs = document.querySelectorAll('.example-img');

  function showError(msg) { errorMsg.textContent = msg; errorMsg.style.display = 'block'; }
  function hideError() { errorMsg.style.display = 'none'; }
  function showProcessing(msg) {
    processingText.textContent = msg || '正在处理...';
    processingOverlay.classList.add('active');
  }
  function hideProcessing() { processingOverlay.classList.remove('active'); }

  kSlider.addEventListener('input', () => {
    kValueLabel.textContent = kSlider.value;
    if (currentImageData) autoRun();
  });

  document.querySelectorAll('input[name="colorSpace"]').forEach(r => {
    r.addEventListener('change', () => {
      currentColorSpace = r.value;
      if (currentImageData) autoRun();
    });
  });

  document.querySelectorAll('input[name="chartType"]').forEach(r => {
    r.addEventListener('change', () => {
      currentChartType = r.value;
      if (clusterResult) renderChart(clusterResult);
    });
  });

  uploadZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => {
    if (e.target.files.length > 0) loadImageFromFile(e.target.files[0]);
  });

  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    if (e.dataTransfer.files.length > 0) loadImageFromFile(e.dataTransfer.files[0]);
  });

  exampleImgs.forEach(img => {
    img.addEventListener('click', () => {
      exampleImgs.forEach(im => im.classList.remove('active'));
      img.classList.add('active');
      loadImageFromUrl(img.dataset.src, img.alt);
    });
  });

  function loadImageFromFile(file) {
    if (!file.type.startsWith('image/')) { showError('请选择图片文件'); return; }
    hideError();
    exampleImgs.forEach(im => im.classList.remove('active'));
    const reader = new FileReader();
    reader.onload = e => loadImageFromUrl(e.target.result, file.name);
    reader.readAsDataURL(file);
  }

  function loadImageFromUrl(url, name) {
    currentImageUrl = url;
    const img = new Image();
    img.crossOrigin = 'Anonymous';
    img.onload = () => {
      imagePreview.src = url;
      imagePreview.style.display = 'block';
      currentImageData = extractPixels(img);
      runBtn.disabled = false;
      aiCheckBtn.disabled = !clusterResult;
      hideError();
      autoRun();
    };
    img.onerror = () => {
      showError('图片加载失败，请尝试其他图片');
      runBtn.disabled = true;
    };
    img.src = url;
  }

  function extractPixels(img) {
    const maxDim = 400;
    let w = img.naturalWidth, h = img.naturalHeight;
    const ratio = Math.min(1, maxDim / Math.max(w, h));
    w = Math.round(w * ratio);
    h = Math.round(h * ratio);

    const canvas = document.createElement('canvas');
    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, w, h);
    const imageData = ctx.getImageData(0, 0, w, h);
    const pixels = imageData.data;
    const result = [];

    let step = Math.max(1, Math.floor((w * h) / MAX_PIXELS));
    for (let i = 0; i < pixels.length; i += 4 * step) {
      result.push({ r: pixels[i], g: pixels[i + 1], b: pixels[i + 2] });
    }
    return result;
  }

  function runClustering() {
    if (!currentImageData) return;
    hideError();

    const k = parseInt(kSlider.value);
    const data = currentColorSpace === 'LAB'
      ? currentImageData.map(c => ColorSpace.rgbToLab(c.r, c.g, c.b))
      : currentImageData;

    const distanceFn = currentColorSpace === 'LAB'
      ? ColorSpace.distanceLab
      : ColorSpace.distanceRgb;

    const kmeans = new KMeans(k);
    kmeans.fit(data, distanceFn);
    clusterResult = kmeans;

    const stats = kmeans.getClusterStats(data);

    // LAB 模式：用簇内像素 RGB 均值做显示色，数据标签保持 LAB
    if (currentColorSpace === 'LAB') {
      const rgbSums = new Array(k).fill(null);
      const rgbCounts = new Array(k).fill(0);
      for (let i = 0; i < currentImageData.length; i++) {
        const label = kmeans.labels[i];
        if (!rgbSums[label]) {
          rgbSums[label] = { r: currentImageData[i].r, g: currentImageData[i].g, b: currentImageData[i].b };
        } else {
          rgbSums[label].r += currentImageData[i].r;
          rgbSums[label].g += currentImageData[i].g;
          rgbSums[label].b += currentImageData[i].b;
        }
        rgbCounts[label]++;
      }
      stats.forEach((s, i) => {
        s.displayColor = {
          r: Math.round(rgbSums[i].r / rgbCounts[i]),
          g: Math.round(rgbSums[i].g / rgbCounts[i]),
          b: Math.round(rgbSums[i].b / rgbCounts[i]),
        };
      });
    }

    clusterResult.stats = stats;
    clusterResult.colorSpace = currentColorSpace;
    clusterResult.originalPixels = currentImageData;

    renderChart(clusterResult);
    renderClusterPalette(stats, currentColorSpace);
    aiCheckBtn.disabled = false;
    hideProcessing();
  }

  function renderChart(result) {
    if (chartInstance) chartInstance.dispose();

    const stats = result.stats;
    const labels = stats.map((s, i) => `C${i + 1}`);
    const values = stats.map(s => s.count);
    const colors = stats.map(s => {
      const c = result.colorSpace === 'LAB' ? s.displayColor : s.centroid;
      const r = Math.round(Math.max(0, Math.min(255, c.r)));
      const g = Math.round(Math.max(0, Math.min(255, c.g)));
      const b = Math.round(Math.max(0, Math.min(255, c.b)));
      return `rgb(${r},${g},${b})`;
    });

    noDataHint.style.display = 'none';
    chartContainer.style.display = 'block';
    chartInstance = echarts.init(chartContainer);

    let option;
    if (currentChartType === 'pie') {
      option = {
        tooltip: {
          trigger: 'item',
          formatter: p => {
            const idx = p.dataIndex;
            const s = stats[idx];
            let colorInfo;
            if (result.colorSpace === 'LAB' && s.centroid) {
              colorInfo = `LAB(${s.centroid.l.toFixed(1)}, ${s.centroid.a.toFixed(1)}, ${s.centroid.b.toFixed(1)})`;
            } else {
              colorInfo = `RGB(${Math.round(s.centroid.r)}, ${Math.round(s.centroid.g)}, ${Math.round(s.centroid.b)})`;
            }
            return `${p.name}<br/>像素数: ${p.value.toLocaleString()} (${p.percent}%)<br/>${colorInfo}`;
          }
        },
        legend: { bottom: 10, textStyle: { fontSize: 12 } },
        series: [{
          name: '聚类结果',
          type: 'pie',
          radius: ['35%', '65%'],
          center: ['50%', '50%'],
          avoidLabelOverlap: false,
          itemStyle: { borderRadius: 4, borderColor: '#fff', borderWidth: 2 },
          label: {
            show: true,
            position: 'outside',
            formatter: '{b}\n{d}%',
            fontSize: 12,
          },
          emphasis: {
            label: { fontSize: 16, fontWeight: 'bold' },
            scaleSize: 12,
          },
          data: labels.map((name, i) => ({
            name, value: values[i],
            itemStyle: { color: colors[i] }
          })),
        }]
      };
    } else {
      option = {
        tooltip: {
          trigger: 'axis',
          axisPointer: { type: 'shadow' },
          formatter: params => {
            const p = params[0];
            const idx = p.dataIndex;
            const s = stats[idx];
            let colorInfo;
            if (result.colorSpace === 'LAB' && s.centroid) {
              colorInfo = `LAB(${s.centroid.l.toFixed(1)}, ${s.centroid.a.toFixed(1)}, ${s.centroid.b.toFixed(1)})`;
            } else {
              colorInfo = `RGB(${Math.round(s.centroid.r)}, ${Math.round(s.centroid.g)}, ${Math.round(s.centroid.b)})`;
            }
            return `${p.name}<br/>像素数: ${p.value.toLocaleString()} (${s.percentage.toFixed(1)}%)<br/>${colorInfo}`;
          }
        },
        grid: { left: 60, right: 30, top: 20, bottom: 50 },
        xAxis: {
          type: 'category',
          data: labels,
          axisLabel: { fontSize: 12 },
        },
        yAxis: {
          type: 'value',
          name: '像素数量',
          axisLabel: { formatter: v => v >= 1000 ? (v / 1000).toFixed(1) + 'k' : v },
        },
        series: [{
          type: 'bar',
          data: values.map((v, i) => ({
            value: v,
            itemStyle: {
              color: colors[i],
              borderRadius: [4, 4, 0, 0],
            },
          })),
          label: {
            show: true,
            position: 'top',
            fontSize: 11,
            formatter: p => `${(stats[p.dataIndex].percentage).toFixed(1)}%`,
          },
          barMaxWidth: 60,
        }],
      };
    }
    chartInstance.setOption(option);

  }

  function renderClusterPalette(stats, colorSpace) {
    clusterDetailCard.style.display = 'block';
    clusterPalette.innerHTML = stats.map((s, i) => {
      const rgbForSwatch = colorSpace === 'LAB' ? s.displayColor : s.centroid;
      const r = Math.round(Math.max(0, Math.min(255, rgbForSwatch.r)));
      const g = Math.round(Math.max(0, Math.min(255, rgbForSwatch.g)));
      const b = Math.round(Math.max(0, Math.min(255, rgbForSwatch.b)));
      const hex = `#${((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).padStart(6, '0')}`;

      let valueText = '';
      if (colorSpace === 'LAB' && s.centroid && typeof s.centroid.l !== 'undefined') {
        const L = Number(s.centroid.l).toFixed(1);
        const A = Number(s.centroid.a).toFixed(1);
        const B = Number(s.centroid.b).toFixed(1);
        valueText = `LAB(${L}, ${A}, ${B})`;
      } else {
        valueText = `RGB(${r}, ${g}, ${b})`;
      }

      return `
        <div class="cluster-swatch">
          <div class="cluster-color" style="background:${hex}" title="${valueText}"></div>
          <div class="cluster-label">C${i + 1}</div>
          <div class="cluster-rgb">${valueText}</div>
          <div class="cluster-count">${s.count.toLocaleString()} 像素 (${s.percentage.toFixed(1)}%)</div>
        </div>
      `;
    }).join('');
  }

  function autoRun() { showProcessing('正在聚类分析...'); setTimeout(runClustering, 50); }

  runBtn.addEventListener('click', () => { showProcessing('正在聚类分析...'); setTimeout(runClustering, 50); });

  // ============================================================
  // AI 颜色和谐判断
  // ============================================================
  aiCheckBtn.addEventListener('click', async () => {
    if (!clusterResult || !clusterResult.stats) return;

    const apiKey = document.getElementById('apiKey').value.trim();
    if (!apiKey) { showError('请先填写 API Key'); return; }

    const endpoint = document.getElementById('apiEndpoint').value.trim();
    const systemPrompt = document.getElementById('systemPrompt').value.trim()
      || '你是一位专业的色彩设计师。请判断以下颜色搭配是否和谐美观，给出专业分析和建议。';

    const stats = clusterResult.stats;
    const colorInfo = stats.map((s, i) => {
      if (clusterResult.colorSpace === 'LAB' && s.centroid) {
        return `C${i + 1}: LAB(${s.centroid.l.toFixed(1)}, ${s.centroid.a.toFixed(1)}, ${s.centroid.b.toFixed(1)}), 占比 ${s.percentage.toFixed(1)}%`;
      }
      const c = s.centroid;
      return `C${i + 1}: RGB(${c.r}, ${c.g}, ${c.b}), 占比 ${s.percentage.toFixed(1)}%`;
    }).join('\n');

    const userMessage = `图片中有 ${stats.length} 种主色（通过K-means聚类得到），请判断这些颜色搭配是否和谐：\n${colorInfo}\n\n请给出：1. 和谐度判断（和谐/不和谐/一般）2. 专业分析 3. 改进建议（如不和谐）`;

    aiResult.style.display = 'block';
    aiResult.innerHTML = '<div class="loading">正在请求 AI 分析...</div>';

    try {
      const response = await fetch(endpoint, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`,
        },
        body: JSON.stringify({
          model: 'deepseek-chat',
          messages: [
            { role: 'system', content: systemPrompt },
            { role: 'user', content: userMessage },
          ],
          temperature: 0.7,
          max_tokens: 600,
        }),
      });

      if (!response.ok) {
        const errText = await response.text();
        throw new Error(`API 请求失败 (${response.status}): ${errText}`);
      }

      const data = await response.json();
      const reply = data.choices?.[0]?.message?.content;
      if (!reply) throw new Error('API 返回数据异常');

      const isHarmonious = reply.includes('和谐') && !reply.includes('不和谐');
      const badgeClass = isHarmonious ? 'harmony-good' : (reply.includes('不和谐') ? 'harmony-bad' : '');
      const badgeText = isHarmonious ? '和谐' : (reply.includes('不和谐') ? '不和谐' : '一般');

      aiResult.innerHTML = `
        <div style="font-weight:600;margin-bottom:8px">
          AI 判断结果：
          ${badgeClass ? `<span class="harmony-badge ${badgeClass}">${badgeText}</span>` : badgeText}
        </div>
        <div style="line-height:1.8;font-size:13px;white-space:pre-wrap">${reply}</div>
      `;
    } catch (err) {
      aiResult.innerHTML = `<div style="color:#991b1b;font-size:13px">${err.message}</div>`;
    }
  });

  // 响应式图表 resize
  window.addEventListener('resize', () => { if (chartInstance) chartInstance.resize(); });

  // 默认加载第一张示例图
  const firstExample = document.querySelector('.example-img');
  if (firstExample) {
    firstExample.classList.add('active');
    loadImageFromUrl(firstExample.src, firstExample.alt);
  }

})();
</script>
